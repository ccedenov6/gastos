<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gastos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:#f5f7fb;">

<div class="container text-center mt-5">

    <h1 class="mb-3">Sistema de Gestión</h1>
    <p class="text-muted">
        Administra tus gastos y registra personas de manera fácil y segura
    </p>

    <div class="row mt-5">

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Registrar Personas</h5>
                    <p>Agrega y administra personas</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Control de Gastos</h5>
                    <p>Gestiona todos los gastos</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Reportes</h5>
                    <p>Visualiza tus movimientos</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card shadow">
                <div class="card-body">
                    <h5>Administración</h5>
                    <p>Control del sistema</p>
                </div>
            </div>
        </div>

    </div>

    <div class="mt-5">

        <a href="/agregarpersonas" class="btn btn-primary btn-lg">
            Entrar a Personas
        </a>

        <a href="/agregarGastos" class="btn btn-dark btn-lg">
            Entrar a Gastos
        </a>

    </div>

</div>

</body>
</html>
