<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Agregar Gasto</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
}

.card{
border-radius:15px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4">

<h2 class="text-center mb-4">Agregar Nuevo Gasto</h2>

<form method="post" enctype="multipart/form-data">
{% csrf_token %}

<div class="mb-3">
<label class="form-label">Descripción</label>
{{ form.descripcion }}
</div>

<div class="mb-3">
<label class="form-label">Monto</label>
{{ form.monto }}
</div>

<div class="mb-3">
<label class="form-label">Categoría</label>
{{ form.categoria }}
</div>

<div class="mb-3">
<label class="form-label">Fecha</label>
{{ form.fecha }}
</div>

<div class="mb-3">
<label class="form-label">Persona</label>
{{ form.persona }}
</div>

<div class="mb-3">
<label class="form-label">Imagen del gasto</label>
{{ form.imagengasto }}
</div>

<div class="text-center mt-4">

<button type="submit" class="btn btn-success">
Agregar Gasto
</button>

<a href="/iniciogastos/" class="btn btn-danger">
Cancelar
</a>

</div>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
