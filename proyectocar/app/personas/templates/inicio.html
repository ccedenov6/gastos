<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema de Gastos del Hogar</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#7b94d3;
}

.card{
    border:none;
    border-radius:15px;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
}

.icon{
    font-size:50px;
}
</style>

</head>

<body>

<div class="container mt-5 text-center">

<h1 class="mb-3">Sistema de Gastos del Hogar</h1>
<p class="text-muted">Administra personas y controla los gastos fácilmente</p>

<div class="row mt-5 justify-content-center">

<div class="col-md-4">
<div class="card shadow p-4">

<div class="icon">👤</div>
<h4 class="mt-3">Personas</h4>

<p>Registrar y administrar personas</p>

<a href="/iniciopersonas/" class="btn btn-primary">
Ver Personas
</a>

<a href="/agregarpersonas/" class="btn btn-secondary mt-2">
Agregar Persona
</a>

</div>
</div>

<div class="col-md-4">
<div class="card shadow p-4">

<div class="icon">💰</div>
<h4 class="mt-3">Gastos</h4>

<p>Controlar los gastos del hogar</p>

<a href="{% url 'iniciogastos' %}" class="btn btn-primary">
Ver Gastos
</a>

<a href="{% url 'agregargastos' %}" class="btn btn-secondary mt-2">
Agregar Gasto
</a>

</div>
</div>

</div>

</div>

</body>
</html>
