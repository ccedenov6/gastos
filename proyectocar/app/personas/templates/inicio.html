<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gastec - Sistema de Gastos</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
{% load static %}

<style>
body{
    background: #f9fbfd;
    color: #5a6c7d;
}

header {
    background: linear-gradient(135deg, #e8f4f8 0%, #d9ebf5 100%);
    padding: 20px 0;
    color: #3d4d5c;
    margin-bottom: 40px;
}

header .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
}

header h1 {
    font-weight: 700;
    margin: 0;
    font-size: 2rem;
    flex: 1;
}

header .header-nav {
    display: flex;
    gap: 15px;
    align-items: center;
}

header .header-nav a {
    color: #3d4d5c;
    text-decoration: none;
    padding: 8px 15px;
    border-radius: 6px;
    transition: all 0.3s ease;
    font-weight: 500;
}

header .header-nav a:hover {
    background: rgba(168, 216, 240, 0.3);
}

header p {
    opacity: 0.9;
    margin: 10px 0 0 0;
    font-size: 0.95rem;
}

.card{
    border: none;
    border-radius: 12px;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    height: 100%;
}

.card:hover{
    transform: translateY(-5px);
    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
}

.card-personas {
    background: linear-gradient(135deg, #347b88 0%, #347b88 100%);
    color: #3d4d5c;
}

.card-gastos {
    background: linear-gradient(135deg, #abb67b 0%, #abb67b 100%);
    color: #3d4d5c;
}

.card-reportes {
    background: linear-gradient(135deg, #a8e6a1 0%, #87d98c 100%);
    color: #3d4d5c;
}

.icon{
    font-size: 50px;
    margin-bottom: 10px;
}

.card h4 {
    font-weight: 600;
    margin-bottom: 10px;
}

.card p {
    font-size: 0.95rem;
    margin-bottom: 15px;
    opacity: 0.95;
}

.btn-primary {
    background: linear-gradient(135deg, #a8d8f0 0%, #87ceeb 100%);
    border: none;
    font-weight: 600;
    color: #3d4d5c;
}

.btn-primary:hover {
    background: linear-gradient(135deg, #87ceeb 0%, #7dbddd 100%);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(168, 216, 240, 0.4);
}

.btn-secondary {
    background: #c5d9e8;
    border: none;
    font-weight: 600;
    color: #3d4d5c;
}

.btn-secondary:hover {
    background: #b8c5cc;
    transform: translateY(-2px);
}

.btn-info {
    background: linear-gradient(135deg, #a8d8f0 0%, #87ceeb 100%);
    border: none;
    font-weight: 600;
    color: #3d4d5c;
}

.btn-warning {
    background: linear-gradient(135deg, #ffd699 0%, #ffcc80 100%);
    border: none;
    font-weight: 600;
    color: #3d4d5c;
}

.btn-warning:hover {
    background: linear-gradient(135deg, #ffcc80 0%, #ffb84d 100%);
    transform: translateY(-2px);
    color: #3d4d5c;
}
</style>

</head>

<body>

<header>
<div class="header-content">
    <div style="display: flex; align-items: center; gap: 15px;">
        <img src="/media/personas/logo.jpeg" alt="Gastec Logo" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;">
        <div>
            <h1>Gastec</h1>
            <p>Tu gestor de finanzas personales y familiar</p>
        </div>
    </div>
    <div class="header-nav">
        <a href="{% url 'ver_personas' %}">Personas</a>
        <a href="{% url 'ver_gastos' %}">Gastos</a>
        <a href="{% url 'reportes_personas' %}">Reportes</a>
        <a href="{% url 'login' %}" style="background: linear-gradient(135deg, #a8d8f0 0%, #87ceeb 100%); padding: 10px 20px;">Cerrar Sesión</a>
    </div>
</div>
</header>

<div class="container text-center">

<div class="row mt-5 justify-content-center">

<div class="col-md-4 mb-4">
<div class="card card-personas shadow p-4">

<img src="/media/personas/familia.jpeg" alt="Personas" style="width: 150px; height: 150px; border-radius: 12px; object-fit: cover; display: block; margin: 0 auto;">
<h4 class="mt-3">Personas</h4>

<a href="{% url 'agregarpersonas' %}" class="btn btn-primary btn-sm w-100">Agregar Persona</a>


<a href="{% url 'ver_personas' %}" class="btn btn-secondary mt-2 btn-sm w-100">
Ver Personas
</a>


</div>
</div>

<div class="col-md-4 mb-4">
<div class="card card-gastos shadow p-4">

<img src="/media/personas/gastos.jpeg" alt="Gastos" style="width: 150px; height: 150px; border-radius: 12px; object-fit: cover; display: block; margin: 0 auto;">
<h4 class="mt-3">Gastos</h4>


<a href="{% url 'agregargastos' %}" class="btn btn-primary btn-sm w-100">Agregar Gasto</a>


<a href="{% url 'ver_gastos' %}" class="btn btn-secondary mt-2 btn-sm w-100">
Ver Gastos
</a>


</div>
</div>

<div class="col-md-4 mb-4">
<div class="card card-reportes shadow p-4">

<img src="/media/personas/reportes.jpeg" alt="Reportes" style="width: 150px; height: 150px; border-radius: 12px; object-fit: cover; display: block; margin: 0 auto;">
<h4 class="mt-3">Reportes</h4>


<a href="{% url 'reportes_mensuales' %}" class="btn btn-primary btn-sm w-100">Reportes Mensuales</a>

<a href="{% url 'reportes_personas' %}" class="btn btn-secondary mt-2 btn-sm w-100">
Por Persona
</a>

</div>
</div>

</div>

</div>

</body>
</html>
