<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GastoFácil - Regístrate</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #a8e6a1 0%, #87d98c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container-register {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            align-items: center;
        }

        .left-section {
            color: white;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 3rem;
        }

        .welcome-image {
            width: 100%;
            max-width: 300px;
            margin: 30px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .welcome-image img {
            width: 100%;
            height: auto;
        }

        .welcome-text h2 {
            font-size: 2rem;
            font-weight: 700;
            margin: 20px 0;
        }

        .welcome-text p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .right-section {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-height: 90vh;
            overflow-y: auto;
        }

        .right-section h3 {
            color: #3d4d5c;
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .right-section p {
            color: #999;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            color: #3d4d5c;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #dce8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #a8e6a1;
            box-shadow: 0 0 0 3px rgba(168, 230, 161, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row .form-group {
            margin-bottom: 18px;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #a8e6a1 0%, #87d98c 100%);
            color: #3d4d5c;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(168, 230, 161, 0.3);
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #dce8f0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            position: relative;
        }

        .social-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid #dce8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .social-btn:hover {
            border-color: #a8e6a1;
            background: #f0f7eb;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #999;
        }

        .login-link a {
            color: #a8e6a1;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .terms {
            font-size: 0.85rem;
            color: #999;
            margin-top: 15px;
            line-height: 1.5;
        }

        .terms a {
            color: #a8e6a1;
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .container-register {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .left-section {
                display: none;
            }

            .right-section {
                padding: 30px 20px;
                max-height: 100%;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
{% load static %}

<div class="container-register">
    <!-- Left Section -->
    <div class="left-section">
        <div class="logo">
            <img src="/media/personas/logo.jpeg" alt="GastoFácil Logo" style="width: 60px; height: 60px; border-radius: 50%; object-fit: cover;">
            <span>GastoFácil</span>
        </div>
        <div class="welcome-image">
            <img src="/media/personas/bienvenida.jpeg" alt="Bienvenida" style="width: 100%; height: auto; border-radius: 15px; object-fit: cover;">
        </div>
        <div class="welcome-text">
            <h2>¡Únete a Nosotros!</h2>
            <p>Comienza a gestionar tus gastos hoy mismo y toma control total de tus finanzas.</p>
        </div>
    </div>

    <!-- Right Section -->
    <div class="right-section">
        <h3>Crear Cuenta</h3>
        <p>Completa el formulario para registrarte</p>

        <form method="post" action="">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                </div>
                <div class="form-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" name="apellido" placeholder="Tu apellido" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>

            <div class="form-group">
                <label for="telefono">Teléfono (Opcional)</label>
                <input type="tel" id="telefono" name="telefono" placeholder="+1 (555) 000-0000">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label for="password_confirm">Confirmar Contraseña</label>
                    <input type="password" id="password_confirm" name="password_confirm" placeholder="••••••••" required>
                </div>
            </div>

            <div class="terms">
                <label style="display: flex; gap: 8px; margin-bottom: 10px;">
                    <input type="checkbox" required> Acepto los <a href="#">Términos de Servicio</a> y la <a href="#">Política de Privacidad</a>
                </label>
            </div>

            <button type="submit" class="btn-register">CREAR CUENTA</button>
        </form>

        <div class="divider">
            <span>O regístrate con</span>
        </div>

        <div class="social-buttons">
            <button class="social-btn" type="button" title="Google">🔵</button>
            <button class="social-btn" type="button" title="Apple">🍎</button>
            <button class="social-btn" type="button" title="Facebook">f</button>
        </div>

        <div class="login-link">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión aquí</a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
