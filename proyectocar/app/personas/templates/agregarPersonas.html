<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Agregar Persona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f9fbfd;
            color: #5a6c7d;
        }

        .card {
            border-radius: 12px;
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #3d4d5c;
            font-weight: 700;
            border-bottom: 3px solid #a8d8f0;
            padding-bottom: 15px;
        }

        .form-control, .form-select {
            border-radius: 6px;
            border: 1px solid #dce8f0;
            padding: 10px 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: #a8d8f0;
            box-shadow: 0 0 0 0.2rem rgba(168, 216, 240, 0.2);
        }

        .form-label {
            color: #3d4d5c;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a8d8f0 0%, #87ceeb 100%);
            border: none;
            font-weight: 600;
            color: #3d4d5c;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #87ceeb 0%, #7dbddd 100%);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(168, 216, 240, 0.4);
        }

        .btn-secondary {
            background: #c5d9e8;
            border: none;
            font-weight: 600;
            color: #3d4d5c;
        }

        .btn-secondary:hover {
            background: #b8c5cc;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow p-4">
                <h2 class="text-center mb-4">Registrar Nueva Persona</h2>

                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Nombres</label>
                        {{ form.Nombres }}
                    </div>

                    <div class="mb-3">
                        <label>Fecha de Nacimiento</label>
                        {{ form.fecha_nacimiento }}
                    </div>

                    <div class="mb-3">
                        <label>Parentesco</label>
                        {{ form.parentesco }}
                    </div>

                    <div class="mb-3">
                        <label>Ocupación</label>
                        {{ form.ocupacion }}
                    </div>

                    <div class="mb-3">
                        <label>Datos Médicos</label>
                        {{ form.datos_medicos }}
                    </div>

                    <div class="mb-3">
                        <label>Ingreso Mensual</label>
                        {{ form.ingreso_mensual }}
                    </div>

                    <div class="mb-3">
                        <label>Edad</label>
                        {{ form.edad }}
                    </div>

                    <div class="mb-3">
                        <label>Email</label>
                        {{ form.email }}
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Foto</label>
                        {{ form.foto }}
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-primary">
                            Guardar Persona
                        </button>
                        <a href="{% url 'ver_personas' %}" class="btn btn-secondary">
                            Volver
                        </a>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
