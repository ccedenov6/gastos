<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agregar Persona</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6fb;
        }

        .card {
            border-radius: 15px;
        }
        
        /* Estilo opcional para que los inputs de Django se vean como Bootstrap */
        input, select, textarea {
            display: block;
            width: 100%;
            padding: 0.375rem 0.75rem;
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: #212529;
            background-color: #fff;
            background-clip: padding-box;
            border: 1px solid #ced4da;
            border-radius: 0.375rem;
            transition: border-color .15s ease-in-out,box-shadow .15s ease-in-out;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow p-4">
                    <h2 class="text-center mb-4">Registrar Nueva Persona</h2>

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Nombres Completos</label>
                            {{ form.Nombres }}
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Fecha de Nacimiento</label>
                                {{ form.Año_de_Nacimiento }}
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Parentesco</label>
                                {{ form.Parentesco_Familiar }}
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ocupación</label>
                            {{ form.Ocupacion }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Datos Médicos</label>
                            {{ form.Datos_medicos }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ingreso Mensual</label>
                            <div class="input-group">
                                <span class="input-group-text">$</span>
                                {{ form.Ingreso_mensual }}
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                Guardar Persona
                            </button>
                            <a href="/listapersonas/" class="btn btn-secondary px-4">
                                Volver
                            </a>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
